services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - type: bind
        source: ${MONGO_VOLUME:-${HOME}/.local/var/dcss-arti-gallery/mongodb-prod}
        target: /data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 3s
      retries: 20

  mongo-indexes:
    image: python:3.12-slim
    working_dir: /workspace
    volumes:
      - ../..:/workspace:ro
    environment:
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DATABASE: ${MONGODB_DATABASE:-dcss_arti_gallery}
      MONGODB_COLLECTION: ${MONGODB_COLLECTION:-artifacts}
      MONGODB_RAW_FILES_COLLECTION: ${MONGODB_RAW_FILES_COLLECTION:-raw_morgue_files}
      MONGODB_CRAWL_ERRORS_COLLECTION: ${MONGODB_CRAWL_ERRORS_COLLECTION:-crawl_errors}
      MONGODB_ARTIFACT_PROCESSING_COLLECTION: ${MONGODB_ARTIFACT_PROCESSING_COLLECTION:-artifact_processing_files}
    command: >
      sh -c "python -m pip install --no-cache-dir 'pymongo>=4.10'
      && python infra/ensure_mongo_indexes.py"
    depends_on:
      mongo:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: ../..
      dockerfile: infra/prod/Dockerfile.api
    restart: unless-stopped
    environment:
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DATABASE: ${MONGODB_DATABASE:-dcss_arti_gallery}
      MONGODB_COLLECTION: ${MONGODB_COLLECTION:-artifacts}
      ARTIFACT_API_CORS_ORIGINS: ${ARTIFACT_API_CORS_ORIGINS:-}
      ARTIFACT_API_CORS_ORIGIN_REGEX: ${ARTIFACT_API_CORS_ORIGIN_REGEX:-}
      ARTIFACT_API_METRICS_ENABLED: ${ARTIFACT_API_METRICS_ENABLED:-1}
    depends_on:
      mongo-indexes:
        condition: service_completed_successfully

  admin-api:
    build:
      context: ../..
      dockerfile: infra/prod/Dockerfile.admin_api
    restart: unless-stopped
    environment:
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DATABASE: ${MONGODB_DATABASE:-dcss_arti_gallery}
      MONGODB_COLLECTION: ${MONGODB_COLLECTION:-artifacts}
      MONGODB_RAW_FILES_COLLECTION: ${MONGODB_RAW_FILES_COLLECTION:-raw_morgue_files}
      MONGODB_CRAWL_ERRORS_COLLECTION: ${MONGODB_CRAWL_ERRORS_COLLECTION:-crawl_errors}
      MONGODB_ARTIFACT_PROCESSING_COLLECTION: ${MONGODB_ARTIFACT_PROCESSING_COLLECTION:-artifact_processing_files}
      ADMIN_API_CORS_ORIGINS: ${ADMIN_API_CORS_ORIGINS:-}
      ADMIN_API_CORS_ORIGIN_REGEX: ${ADMIN_API_CORS_ORIGIN_REGEX:-}
      PROMETHEUS_URL: http://prometheus:9090
      PROMETHEUS_TIMEOUT_SECONDS: ${PROMETHEUS_TIMEOUT_SECONDS:-3}
      PROMETHEUS_METRICS_WINDOW_SECONDS: ${PROMETHEUS_METRICS_WINDOW_SECONDS:-300}
    ports:
      - "127.0.0.1:${ADMIN_API_PORT:-8001}:8001"
    depends_on:
      mongo-indexes:
        condition: service_completed_successfully
      prometheus:
        condition: service_started

  admin-frontend:
    build:
      context: ../..
      dockerfile: infra/prod/Dockerfile.admin_frontend
      args:
        VITE_ADMIN_API_URL: ${VITE_ADMIN_API_URL:-/admin-api}
        VITE_GRAFANA_URL: ${VITE_GRAFANA_URL:-http://127.0.0.1:3000/d/dcss-gallery-api/dcss-gallery-api}
    restart: unless-stopped
    ports:
      - "127.0.0.1:${ADMIN_FRONTEND_PORT:-5174}:5174"
    depends_on:
      - admin-api

  crawl-service:
    profiles: ["jobs"]
    build:
      context: ../..
      dockerfile: infra/prod/Dockerfile.crawl_service
    environment:
      MONGODB_URI: mongodb://mongo:27017
    depends_on:
      mongo-indexes:
        condition: service_completed_successfully

  arti-parser:
    profiles: ["jobs"]
    build:
      context: ../..
      dockerfile: infra/prod/Dockerfile.arti_parser
    environment:
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DATABASE: ${MONGODB_DATABASE:-dcss_arti_gallery}
      MONGODB_RAW_FILES_COLLECTION: ${MONGODB_RAW_FILES_COLLECTION:-raw_morgue_files}
      MONGODB_COLLECTION: ${MONGODB_COLLECTION:-artifacts}
      MONGODB_ARTIFACT_PROCESSING_COLLECTION: ${MONGODB_ARTIFACT_PROCESSING_COLLECTION:-artifact_processing_files}
      ARTIFACT_PROCESS_LOG_LEVEL: ${ARTIFACT_PROCESS_LOG_LEVEL:-INFO}
      BATCH_SIZE: ${BATCH_SIZE:-100}
      SCAN_BATCH_SIZE: ${SCAN_BATCH_SIZE:-500}
      PROCESS_LOOP_INTERVAL_SECONDS: ${PROCESS_LOOP_INTERVAL_SECONDS:-0}
    depends_on:
      mongo-indexes:
        condition: service_completed_successfully

  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    depends_on:
      - api

  grafana:
    image: grafana/grafana:11.4.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3000}:3000"
    depends_on:
      - prometheus

  reverse-proxy:
    build:
      context: ../..
      dockerfile: infra/prod/Dockerfile.frontend
      args:
        VITE_ARTIFACT_API_URL: ${VITE_ARTIFACT_API_URL:-/api}
    restart: unless-stopped
    environment:
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN:-perusonari.ddns.net}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - "${PUBLIC_HTTP_PORT:-80}:80"
      - "${PUBLIC_HTTPS_PORT:-443}:443"
    depends_on:
      - api

volumes:
  prometheus_data:
  grafana_data:
  caddy_data:
  caddy_config:
