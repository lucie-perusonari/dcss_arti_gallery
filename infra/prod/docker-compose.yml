services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db

  api:
    build:
      context: ../..
      dockerfile: infra/prod/Dockerfile.api
    restart: unless-stopped
    environment:
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DATABASE: ${MONGODB_DATABASE:-dcss_arti_gallery}
      MONGODB_COLLECTION: ${MONGODB_COLLECTION:-artifacts}
      ARTIFACT_API_CORS_ORIGINS: ${ARTIFACT_API_CORS_ORIGINS:-}
      ARTIFACT_API_CORS_ORIGIN_REGEX: ${ARTIFACT_API_CORS_ORIGIN_REGEX:-}
      ARTIFACT_API_METRICS_ENABLED: ${ARTIFACT_API_METRICS_ENABLED:-1}
    depends_on:
      - mongo

  admin-api:
    build:
      context: ../..
      dockerfile: infra/prod/Dockerfile.admin_api
    restart: unless-stopped
    environment:
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DATABASE: ${MONGODB_DATABASE:-dcss_arti_gallery}
      MONGODB_COLLECTION: ${MONGODB_COLLECTION:-artifacts}
      MONGODB_RAW_FILES_COLLECTION: ${MONGODB_RAW_FILES_COLLECTION:-raw_morgue_files}
      MONGODB_CRAWL_FILES_COLLECTION: ${MONGODB_CRAWL_FILES_COLLECTION:-crawl_files}
      MONGODB_CRAWL_USERS_COLLECTION: ${MONGODB_CRAWL_USERS_COLLECTION:-crawl_users}
      ADMIN_API_CORS_ORIGINS: ${ADMIN_API_CORS_ORIGINS:-}
      ADMIN_API_CORS_ORIGIN_REGEX: ${ADMIN_API_CORS_ORIGIN_REGEX:-}
      PROMETHEUS_URL: http://prometheus:9090
      PROMETHEUS_TIMEOUT_SECONDS: ${PROMETHEUS_TIMEOUT_SECONDS:-3}
      PROMETHEUS_METRICS_WINDOW_SECONDS: ${PROMETHEUS_METRICS_WINDOW_SECONDS:-300}
    ports:
      - "127.0.0.1:${ADMIN_API_PORT:-8001}:8001"
    depends_on:
      - mongo
      - prometheus

  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    depends_on:
      - api

  grafana:
    image: grafana/grafana:11.4.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3000}:3000"
    depends_on:
      - prometheus

  reverse-proxy:
    image: caddy:2.9
    restart: unless-stopped
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    ports:
      - "${PUBLIC_API_PORT:-8000}:80"
    depends_on:
      - api

volumes:
  mongo_data:
  prometheus_data:
  grafana_data:
